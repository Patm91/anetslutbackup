#max_power: 1.0
#kick_start_time: 0.5
#pwm: true
#shutdown_value: 0
value: 1.0
#cycle_time: 0.01
#scale: 100
 
# Lighting Control
[gcode_macro lights_off]
gcode:
    SET_PIN PIN=work_light VALUE=0
 
[gcode_macro lights_on]
gcode:
    SET_PIN PIN=work_light VALUE=1.0
 
[gcode_macro lights_toggle]
