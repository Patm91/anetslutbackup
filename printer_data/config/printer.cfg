#tachometer_pin:
#tachometer_ppr:
#tachometer_poll_interval:
#enable_pin:
#   See the "fan" section for a description of the above parameters.

    
[gcode_macro SET_FILAMENT_FAN]
gcode:
    {% set filament_type = params.filament_type|default("PLA")|upper %}
    {% set fan_name = "enclosure_fan" %}
    
    {% if filament_type == "PLA" or filament_type == "PETG" %}
        # Off to avoid warping
        SET_FAN_SPEED FAN={fan_name} SPEED=0.0
        RESPOND MSG="Enclosure Fan set for PLA (Off)"
    {% elif filament_type == "ABS" or filament_type == "ASA" %}
        # High speed for exhaust/air filtration
        SET_FAN_SPEED FAN={fan_name} SPEED=0.8
        RESPOND MSG="Enclosure Fan set for ABS (High)"
    {% else %}
        # Default/Off
        SET_FAN_SPEED FAN={fan_name} SPEED=0.0
        RESPOND MSG="Enclosure Fan Off"
    {% endif %}

[gcode_macro START_PRINT]
gcode:
    {% set filament_type = params.falment_type|default('PLA')|string %}
    # ... other start_print code ...
    SET_FILAMENT_FAN TYPE={filament_type}


